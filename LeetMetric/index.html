<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetMetric</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>LeetMetric</h1>
      <div class="user-conatainer">
        <p>Enter your LeetCode username:</p>
        <div class="user-input-container">
          <input type="text" id="user-input" placeholder="LeetCode Username" />
          <button id="search-btn">Search</button>
        </div>
      </div>
      <div class="stats-container">
        <div class="progress">
          <div class="progress_item">
            <div class="easy_progress circle">
              <span id="easy-label"></span>
              Easy
            </div>
          </div>
          <div class="progress_item circle">
            <div class="medium_progress">
              <span id="medium-label"></span>
              Medium
            </div>
          </div>
          <div class="progress_item circle">
            <div class="hard_progress">
              <span id="hard-label"></span>
              Hard
            </div>
          </div>
        </div>

        <div class="stats-card">
          <!-- directly populate card here from the JS code-->
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
